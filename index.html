    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        const map = L.map('map').setView([37.541, 126.986], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        let markers = [];
        let facilities = [];

        function renderMarkers(items) {
            markers.forEach(marker => map.removeLayer(marker));
            markers = [];

            const bounds = [];
            items.forEach(item => {
                const marker = L.marker([item.lat, item.lng]).addTo(map)
                    .bindPopup(item.name);
                markers.push(marker);
                bounds.push([item.lat, item.lng]);
            });

            if (bounds.length) {
                map.fitBounds(bounds, { padding: [30, 30], maxZoom: 14 });
            } else {
                map.setView([37.541, 126.986], 11);
            }
        }

        fetch('./data/facilities.json')
            .then(res => res.json())
            .then(data => {
                facilities = data;
                renderMarkers(facilities);
            })
            .catch(err => {
                console.error('시설 데이터를 불러오지 못했습니다.', err);
                alert('시설 데이터를 불러오지 못했습니다. data/facilities.json 파일을 확인해주세요.');
            });

        document.getElementById('update-map').addEventListener('click', function () {
            const keyword = document.getElementById('get-region').value.trim();
            if (!keyword) {
                renderMarkers(facilities);
                return;
            }
            const filtered = facilities.filter(item => item.name.includes(keyword));
            renderMarkers(filtered);
        });

        document.getElementById('get-region').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('update-map').click();
            }
        });
    </script>
