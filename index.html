<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <title>서울시 흡연구역 지도</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="서울시 흡연시설, 흡연구역 지도, 공공데이터" name="keywords">
    <meta content="서울시 흡연시설 위치를 확인하고 지역별 시설 수요를 살펴볼 수 있는 웹 서비스" name="description">

    <link href="img/favicon.ico" rel="icon">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500&family=Jost:wght@500;600;700&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <link href="lib/animate/animate.min.css" rel="stylesheet">
    <link href="lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">
    <link href="lib/lightbox/css/lightbox.min.css" rel="stylesheet">

    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
</head>

<body>
    <div class="container-xxl bg-white p-0">
        <div id="spinner"
            class="show bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
            <div class="spinner-grow text-primary" style="width: 3rem; height: 3rem;" role="status">
                <span class="sr-only">Loading...</span>
            </div>
        </div>

        <div class="container-xxl position-relative p-0">
            <nav class="navbar navbar-expand-lg navbar-light px-4 px-lg-5 py-3 py-lg-0">
                <a href="./index.html" class="navbar-brand p-0">
                    <h1 class="m-0 brand-text">IoT</h1>
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
                    <span class="fa fa-bars"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarCollapse">
                    <div class="navbar-nav mx-auto py-0">
                        <a href="./index.html" class="nav-item nav-link active">서울시 흡연구역 지도</a>
                        <a href="./data.html" class="nav-item nav-link">시설 수요 분석</a>
                        <div class="nav-item dropdown">
                            <a href="#" class="nav-link dropdown-toggle" data-bs-toggle="dropdown">문의 게시판</a>
                            <div class="dropdown-menu m-0">
                                <a href="./contactweb.html" class="dropdown-item">웹사이트 불편사항</a>
                                <a href="./contactarea.html" class="dropdown-item">흡연시설 불편사항</a>
                            </div>
                        </div>
                    </div>
                </div>
            </nav>

            <section class="hero-modern">
                <div class="container px-lg-5">
                    <div class="hero-content text-center">
                        <span class="hero-badge">Seoul Smoking Area Map</span>
                        <h1 class="hero-title">서울시 흡연구역 지도</h1>
                        <p class="hero-subtitle">
                            공공데이터 기반으로 서울시 흡연시설 위치를 확인하고,
                            원하는 지역 키워드로 빠르게 탐색해보세요.
                        </p>

                        <div class="search-panel mx-auto">
                            <label for="get-region" class="visually-hidden">지역 검색</label>
                            <input type="text" id="get-region" class="search-input"
                                placeholder="예: 과천, 강남구, 서울역">
                            <button id="update-map" class="search-btn" aria-label="검색">
                                <i class="fa fa-search"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <section class="map-section">
            <div class="container px-lg-5">
                <div class="map-card">
                    <div class="map-card-header">
                        <div>
                            <h2>지도 보기</h2>
                            <p>서울시 흡연시설 위치를 지도에서 확인할 수 있습니다.</p>
                        </div>
                        <button id="reset-map" class="reset-btn" type="button">전체 보기</button>
                    </div>

                    <div id="map"></div>
                </div>
            </div>
        </section>
    </div>

    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="lib/wow/wow.min.js"></script>
    <script src="lib/easing/easing.min.js"></script>
    <script src="lib/waypoints/waypoints.min.js"></script>
    <script src="lib/counterup/counterup.min.js"></script>
    <script src="lib/owlcarousel/owl.carousel.min.js"></script>
    <script src="lib/isotope/isotope.pkgd.min.js"></script>
    <script src="lib/lightbox/js/lightbox.min.js"></script>

    <script src="js/main.js"></script>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        const map = L.map('map').setView([37.541, 126.986], 11);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        let markers = [];
        let facilities = [];

        function renderMarkers(items) {
            markers.forEach(marker => map.removeLayer(marker));
            markers = [];

            const bounds = [];

            items.forEach(item => {
                const marker = L.marker([item.lat, item.lng]).addTo(map)
                    .bindPopup(`<strong>${item.name}</strong>`);
                markers.push(marker);
                bounds.push([item.lat, item.lng]);
            });

            if (bounds.length) {
                map.fitBounds(bounds, { padding: [30, 30], maxZoom: 14 });
            } else {
                map.setView([37.541, 126.986], 11);
            }
        }

        function filterFacilities() {
            const keyword = document.getElementById('get-region').value.trim();

            if (!keyword) {
                renderMarkers(facilities);
                return;
            }

            const filtered = facilities.filter(item =>
                item.name.toLowerCase().includes(keyword.toLowerCase())
            );

            renderMarkers(filtered);
        }

        fetch('./data/facilities.json')
            .then(res => res.json())
            .then(data => {
                facilities = data;
                renderMarkers(facilities);
            })
            .catch(err => {
                console.error('시설 데이터를 불러오지 못했습니다.', err);
                alert('시설 데이터를 불러오지 못했습니다. data/facilities.json 파일을 확인해주세요.');
            });

        document.getElementById('update-map').addEventListener('click', filterFacilities);

        document.getElementById('get-region').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                filterFacilities();
            }
        });

        document.getElementById('reset-map').addEventListener('click', function () {
            document.getElementById('get-region').value = '';
            renderMarkers(facilities);
        });
    </script>
</body>

</html>
